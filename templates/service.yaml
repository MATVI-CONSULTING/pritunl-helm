---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pritunl.fullname" . }}
  labels:
{{ include "pritunl.labels" . | indent 4 }}
{{- with .Values.service.annotations }}
  annotations:
{{ tpl (toYaml .) $ | indent 4 }}
{{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if eq .Values.service.type "LoadBalancer" }}
  {{- with .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ . }}
  {{- end }}
  {{- with .Values.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
  ports:
    {{- if .Values.service.openvpn.enabled }}
    - name: openvpn
      port: {{ .Values.service.port }}
      targetPort: openvpn
      {{- with .Values.service.nodePort }}
      nodePort: {{ . }}
      {{- end }}
      protocol: {{ .Values.service.protocol }}
    {{- end }}
    {{- if .Values.service.wireguard.enabled }}
    - name: wireguard
      port: {{ .Values.service.wireguard.port }}
      targetPort: wireguard
      protocol: UDP
    {{- end }}
    {{- if .Values.service.web.enabled }}
    - name: https
      port: {{ .Values.service.web.port }}
      targetPort: https
      protocol: TCP
    {{- end }}
  selector:
    app: {{ include "pritunl.name" . }}
    release: {{ .Release.Name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pritunl.fullname" . }}-web
  labels:
{{ include "pritunl.labels" . | indent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: https
      port: 443
      targetPort: https
  selector:
    app: {{ include "pritunl.name" . }}
    release: {{ .Release.Name }}
