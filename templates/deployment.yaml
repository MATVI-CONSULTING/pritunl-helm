---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pritunl.fullname" . }}
  labels:
    {{- include "pritunl.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ include "pritunl.name" . }}
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ include "pritunl.name" . }}
        release: {{ .Release.Name }}
      annotations:
        checksum/pritunl.conf: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ template "pritunl.serviceAccountName" . }}
      initContainers:
        - name: alpine
          image: alpine
          command: ["sh", "-c", "cp /configmap/pritunl.conf /etc/pritunl"]
          volumeMounts:
            - name: conf
              mountPath: /etc/pritunl
            - name: configmap
              mountPath: /configmap
      containers:
        - name: pritunl
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PRITUNL_OVERRIDE_CONF
              value: /etc/pritunl/pritunl.conf
          {{- if .Values.mongoDBUriSecretName }}
            # (b) existingSecret : URI Mongo lue depuis un Secret k8s préexistant.
            - name: PRITUNL_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mongoDBUriSecretName }}
                  key: {{ .Values.mongoDBUriSecretKey | default "PRITUNL_MONGODB_URI" }}
          {{- else if .Values.mongoURI }}
            # (c) URI inline : Secret créé par le chart (mongo.secrets.yaml).
            - name: PRITUNL_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-mongo-secrets
                  key: PRITUNL_MONGODB_URI
          {{- else if (include "pritunl.mongodbUriTemplate" .) }}
            # (a) Auto-contenu : gabarit d'URI + mot de passe injecté depuis le
            # Secret du subchart MongoDB Bitnami (résolu par l'entrypoint).
            - name: PRITUNL_MONGODB_URI_TEMPLATE
              value: {{ include "pritunl.mongodbUriTemplate" . }}
            {{- if .Values.mongodb.enabled }}
            - name: PRITUNL_MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mongoPasswordSecretName | default (printf "%s-mongodb" .Release.Name) }}
                  key: {{ .Values.mongoPasswordSecretKey | default "mongodb-passwords" }}
            {{- end }}
          {{- end }}
          ports:
            - name: https
              containerPort: 443
            {{- if .Values.service.openvpn.enabled }}
            - name: openvpn
              containerPort: {{ .Values.service.port }}
              protocol: {{ .Values.service.protocol }}
            {{- end }}
            {{- if .Values.service.wireguard.enabled }}
            - name: wireguard
              containerPort: {{ .Values.service.wireguard.port }}
              protocol: UDP
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: conf
              mountPath: /etc/pritunl
            {{- if .Values.logs.emptyDir }}
            - name: log
              mountPath: /var/log
            {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: configmap
          configMap:
            name: {{ include "pritunl.fullname" . }}
        - name: conf
          emptyDir: {}
        {{- if .Values.logs.emptyDir }}
        - name: log
          emptyDir: {}
        {{- end }}
